<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMIT Wayfinder - Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css" rel="stylesheet">
    <link rel="stylesheet" href="static/style.css">
</head>
<body>

    <main class="app-container">
        <section class="navigator-panel">
            <div class="header-section">
                <div class="status-badge"><span class="status-dot"></span> 4-FLOOR SYSTEM READY</div>
                <div class="title-wrapper">
                    <h1>WAYFINDER</h1>
                </div>
            </div>

            <form method="POST" id="nav-form">
                <div class="form-group">
                    <label class="field-label">CURRENT LOCATION</label>
                    <select id="start_node" name="start_node" required>
                        <option value="">Search start...</option>
                        {% for code, name in nodes %} <option value="{{ code }}">{{ name }}</option> {% endfor %}
                    </select>
                </div>

                <div id="stops-container"></div>
                
                <button type="button" class="add-stop-btn" onclick="addStopField()">+ ADD STOP</button>

                <div class="form-group" style="margin-top: 15px;">
                    <label class="field-label">FINAL DESTINATION</label>
                    <select id="end_node" name="end_node" required>
                        <option value="">Search destination...</option>
                        {% for code, name in nodes %} <option value="{{ code }}">{{ name }}</option> {% endfor %}
                    </select>
                </div>

                <div class="form-group checkbox-group">
                    <label><input type="checkbox" name="accessible" value="true"> ♿ Avoid Stairs</label>
                </div>

                <div class="action-buttons">
                    <button type="submit" class="start-btn">INITIATE ROUTE</button>
                </div>
            </form>
            
            <template id="stop-template">
                <div class="form-group stop-group">
                    <label class="field-label">VIA (STOP)</label>
                    <div style="display: flex; gap: 5px;">
                        <select name="stops[]" class="stop-select" required>
                            <option value="">Search stop...</option>
                            {% for code, name in nodes %} <option value="{{ code }}">{{ name }}</option> {% endfor %}
                        </select>
                        <button type="button" class="remove-stop" onclick="this.parentElement.parentElement.remove()">✕</button>
                    </div>
                </div>
            </template>
        </section>

        <section class="map-section">
            <div class="map-header">
                <div class="floor-tabs">
                    <button class="floor-tab active" data-floor="1" onclick="switchFloor(1)">F1</button>
                    <button class="floor-tab" data-floor="2" onclick="switchFloor(2)">F2</button>
                    <button class="floor-tab" data-floor="3" onclick="switchFloor(3)">F3</button>
                    <button class="floor-tab" data-floor="4" onclick="switchFloor(4)">F4</button>
                </div>
                
                <div class="zoom-controls">
                    <button onclick="zoomMap(0.2)">+</button>
                    <button onclick="zoomMap(-0.2)">-</button>
                    <button onclick="resetZoom()">⟲</button>
                </div>
            </div>
            
            <div class="map-display" id="map-viewport">
                <div id="f1-container" class="map-container" style="display:block;">
                    <img src="static/floor1.png" class="map-image">
                    <svg id="svg-f1" class="map-overlay"></svg>
                </div>
                <div id="f2-container" class="map-container" style="display:none;">
                    <img src="static/floor2.png" class="map-image">
                    <svg id="svg-f2" class="map-overlay"></svg>
                </div>
                <div id="f3-container" class="map-container" style="display:none;">
                    <img src="static/floor3.png" class="map-image">
                    <svg id="svg-f3" class="map-overlay"></svg>
                </div>
                <div id="f4-container" class="map-container" style="display:none;">
                    <img src="static/floor4.png" class="map-image">
                    <svg id="svg-f4" class="map-overlay"></svg>
                </div>
            </div>
        </section>
    </main>

    <script>
        window.pathData = JSON.parse('{{ path_data|safe }}' || '[]');
        window.allNodes = JSON.parse('{{ all_nodes|safe }}' || '{}');
    </script>
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
    <script src="static/script.js"></script>
</body>
</html>
